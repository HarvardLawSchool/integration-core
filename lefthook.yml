# https://lefthook.dev/configuration/

pre-push:
  jobs:
    - run: deno task audit
    - run: deno fmt && deno lint && deno check && deno test --permit-no-files
      glob: "*.{ts,sql,json,yml}"
    # - run: deno task check:deps

pre-commit:
  jobs:
    - run: deno fmt && deno lint && deno check
      glob: "*.{ts,sql,json,yml}"
