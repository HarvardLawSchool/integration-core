### Reusable Deploy Workflow
# Called by integration repos via:
#   uses: [ORG]/[REPO]/.github/workflows/deploy-integration.yml@main
#
# *** BREAKING CHANGE WARNING ***
# This workflow is referenced at @main by all integration repos.
# Any breaking change here (renamed inputs, changed SAM flags, removed steps)
# takes effect IMMEDIATELY across every integration on their next deployment.
#
# Before merging changes to this file:
#   1. Test against at least one integration repo manually
#   2. Announce changes to integration developers
#   3. Consider using a feature branch and updating integrations one at a time
#
# Non-breaking changes (new optional inputs with defaults, added steps) are safe.
#
### Approval Gate
# Production deployments require manual approval from the DevOps team.
#
# One-time setup (integration-core repo):
#   Repo / Settings / Environments / prod
#     - Required reviewers: org/devops and/or individuals
#     - Deployment branches: release/prod only

name: Deploy Integration (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  ### Approval Gate
  #
  # Skipped entirely for non-production environments (dev flows through).
  # For production: pauses here and notifies required reviewers.
  # The deploy job will not start until this job completes successfully.
  await-approval:
    if: inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Approval checkpoint
        run: |
          echo "✅ Production deployment approved"
          echo "Approved by: ${{ github.actor }}"
          echo "Ref:         ${{ github.ref }}"
          echo "Environment: ${{ inputs.environment }}"

  ### Deploy
  # Runs immediately for dev (await-approval skipped).
  # Runs after approval for production.
  deploy:
    needs: await-approval
    if: |
      always() && (
        needs.await-approval.result == 'success' ||
        needs.await-approval.result == 'skipped'
      )
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout integration repo
        uses: actions/checkout@v5

      - name: Validate config file exists
        run: |
          CONFIG=".github/integration.config.${{ inputs.environment }}"
          if [ ! -f "$CONFIG" ]; then
            echo "❌ No config file found for environment '${{ inputs.environment }}'"
            echo "   Expected: $CONFIG"
            exit 1
          fi

      - name: Read integration config
        id: config
        run: |
          source .github/integration.config.${{ inputs.environment }}
          echo "stack_name=$STACK_NAME"                           >> "$GITHUB_OUTPUT"
          echo "aws_region=$AWS_REGION"                           >> "$GITHUB_OUTPUT"
          echo "aws_role_arn=$AWS_ROLE_ARN"                       >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$SAM_DEPLOYMENT_BUCKET"                 >> "$GITHUB_OUTPUT"
          echo "trigger_type=$TRIGGER_TYPE"                       >> "$GITHUB_OUTPUT"
          echo "schedule=$SCHEDULE"                               >> "$GITHUB_OUTPUT"
          echo "schedule_alarm_window=$SCHEDULE_ALARM_WINDOW"     >> "$GITHUB_OUTPUT"
          echo "schedule_eval_periods=$SCHEDULE_EVAL_PERIODS"     >> "$GITHUB_OUTPUT"
          echo "log_level=$LOG_LEVEL"                             >> "$GITHUB_OUTPUT"
          echo "alert_email_override=$ALERT_EMAIL_OVERRIDE"       >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.config.outputs.aws_role_arn }}
          aws-region: ${{ steps.config.outputs.aws_region }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Fetch shared base template
        run: |
          REF="${GITHUB_WORKFLOW_REF##*@}"
          REF="${REF#refs/heads/}"
          REF="${REF#refs/tags/}"
          echo "Fetching template.yml @ ${REF}"
          curl -fsSL \
            "https://raw.githubusercontent.com/HarvardLawSchool/integration-core/${REF}/template.yml" \
            -o template.yml
          echo "Fetched template.yml ($(wc -l < template.yml) lines)"

      - name: SAM build
        run: sam build --use-container --no-cached

      - name: SAM deploy
        env:
          TRIGGER_TYPE: ${{ steps.config.outputs.trigger_type }}
          ALERT_EMAIL_OVERRIDE: ${{ steps.config.outputs.alert_email_override }}
          SCHEDULE: ${{ steps.config.outputs.schedule }}
          SCHEDULE_ALARM_WINDOW: ${{ steps.config.outputs.schedule_alarm_window }}
          SCHEDULE_EVAL_PERIODS: ${{ steps.config.outputs.schedule_eval_periods }}
          LOG_LEVEL: ${{ steps.config.outputs.log_level }}
        run: |
          PARAM_OVERRIDES=(
            "Environment=${{ inputs.environment }}"
            "TriggerType=${TRIGGER_TYPE:-schedule}"
          )
          [ -n "$ALERT_EMAIL_OVERRIDE" ]  && PARAM_OVERRIDES+=("AlertEmailOverride=$ALERT_EMAIL_OVERRIDE")
          [ -n "$LOG_LEVEL" ]             && PARAM_OVERRIDES+=("LogLevel=$LOG_LEVEL")

          if [ "${TRIGGER_TYPE}" != "webhook" ]; then
            [ -n "$SCHEDULE" ]              && PARAM_OVERRIDES+=("ScheduleExpression='$SCHEDULE'")
            [ -n "$SCHEDULE_EVAL_PERIODS" ] && PARAM_OVERRIDES+=("ScheduleEvaluationPeriods=$SCHEDULE_EVAL_PERIODS")
            [ -n "$SCHEDULE_ALARM_WINDOW" ] && PARAM_OVERRIDES+=("ScheduleAlarmWindow=$SCHEDULE_ALARM_WINDOW")
          fi

          printf '%s\n' "${PARAM_OVERRIDES[@]}"

          sam deploy \
            --stack-name "${{ steps.config.outputs.stack_name }}" \
            --s3-bucket "${{ steps.config.outputs.s3_bucket }}" \
            --region "${{ steps.config.outputs.aws_region }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-resolve-s3 \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"
