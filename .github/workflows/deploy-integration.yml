# ── Reusable Deploy Workflow ───────────────────────────────────────────────────
# Called by integration repos via:
#   uses: [ORG]/[REPO]/.github/workflows/deploy-integration.yml@main
#
# *** BREAKING CHANGE WARNING ***
# This workflow is referenced at @main by all integration repos.
# Any breaking change here (renamed inputs, changed SAM flags, removed steps)
# takes effect IMMEDIATELY across every integration on their next deployment.
#
# Before merging changes to this file:
#   1. Test against at least one integration repo manually
#   2. Announce changes to integration developers
#   3. Consider using a feature branch and updating integrations one at a time
#
# Non-breaking changes (new optional inputs with defaults, added steps) are safe.
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Integration (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      trigger_type:
        required: false
        type: string
        default: "both"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout integration repo
        uses: actions/checkout@v4

      - name: Normalize workflow vars (trim CR/whitespace)
        run: |
          trim() {
            # strips carriage-returns and leading/trailing whitespace
            printf '%s' "$1" \
              | tr -d '\r' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          {
            echo "STACK_NAME=$$(trim "$${{ vars.STACK_NAME }}")"
            echo "S3_BUCKET=$$(trim "$${{ vars.S3_BUCKET }}")"
            echo "AWS_REGION=$$(trim "$${{ vars.AWS_REGION }}")"
            echo "AWS_ROLE_ARN=$$(trim "$${{ vars.aws_role_arn }}")"

            echo "SCHEDULE=$$(trim "$${{ vars.SCHEDULE }}")"
            echo "LOG_LEVEL=$$(trim "$${{ vars.LOG_LEVEL }}")"
            echo "ALERT_EMAIL_OVERRIDE=$$(trim "$${{ vars.ALERT_EMAIL_OVERRIDE }}")"
            echo "SCHEDULE_EVAL_PERIODS=$$(trim "$${{ vars.SCHEDULE_EVAL_PERIODS }}")"
            echo "SCHEDULE_ALARM_WINDOW=$$(trim "$${{ vars.SCHEDULE_ALARM_WINDOW }}")"

            echo "OPTIONAL_ALARM1_FILTER=$$(trim "$${{ vars.OPTIONAL_ALARM1_FILTER }}")"
            echo "OPTIONAL_ALARM1_WINDOW=$$(trim "$${{ vars.OPTIONAL_ALARM1_WINDOW }}")"
            echo "OPTIONAL_ALARM1_STATISTIC=$$(trim "$${{ vars.OPTIONAL_ALARM1_STATISTIC }}")"
            echo "OPTIONAL_ALARM1_THRESHOLD=$$(trim "$${{ vars.OPTIONAL_ALARM1_THRESHOLD }}")"
            echo "OPTIONAL_ALARM1_COMPARISON_OPERATOR=$$(trim "$${{ vars.OPTIONAL_ALARM1_COMPARISON_OPERATOR }}")"

            echo "OPTIONAL_ALARM2_FILTER=$$(trim "$${{ vars.OPTIONAL_ALARM2_FILTER }}")"
            echo "OPTIONAL_ALARM2_WINDOW=$$(trim "$${{ vars.OPTIONAL_ALARM2_WINDOW }}")"
            echo "OPTIONAL_ALARM2_STATISTIC=$$(trim "$${{ vars.OPTIONAL_ALARM2_STATISTIC }}")"
            echo "OPTIONAL_ALARM2_THRESHOLD=$$(trim "$${{ vars.OPTIONAL_ALARM2_THRESHOLD }}")"
            echo "OPTIONAL_ALARM2_COMPARISON_OPERATOR=$$(trim "$${{ vars.OPTIONAL_ALARM2_COMPARISON_OPERATOR }}")"
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.aws_role_arn }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --use-container --no-cached

      - name: SAM deploy
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          TRIGGER_TYPE: ${{ inputs.trigger_type }}
          SCHEDULE: ${{ vars.SCHEDULE }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          ALERT_EMAIL_OVERRIDE: ${{ vars.ALERT_EMAIL_OVERRIDE }}
          SCHEDULE_EVAL_PERIODS: ${{ vars.SCHEDULE_EVAL_PERIODS }}
          SCHEDULE_ALARM_WINDOW: ${{ vars.SCHEDULE_ALARM_WINDOW }}
          OPTIONAL_ALARM1_FILTER: ${{ vars.OPTIONAL_ALARM1_FILTER }}
          OPTIONAL_ALARM1_WINDOW: ${{ vars.OPTIONAL_ALARM1_WINDOW }}
          OPTIONAL_ALARM1_STATISTIC: ${{ vars.OPTIONAL_ALARM1_STATISTIC }}
          OPTIONAL_ALARM1_THRESHOLD: ${{ vars.OPTIONAL_ALARM1_THRESHOLD }}
          OPTIONAL_ALARM1_COMPARISON_OPERATOR: ${{ vars.OPTIONAL_ALARM1_COMPARISON_OPERATOR }}
          OPTIONAL_ALARM2_FILTER: ${{ vars.OPTIONAL_ALARM2_FILTER }}
          OPTIONAL_ALARM2_WINDOW: ${{ vars.OPTIONAL_ALARM2_WINDOW }}
          OPTIONAL_ALARM2_STATISTIC: ${{ vars.OPTIONAL_ALARM2_STATISTIC }}
          OPTIONAL_ALARM2_THRESHOLD: ${{ vars.OPTIONAL_ALARM2_THRESHOLD }}
          OPTIONAL_ALARM2_COMPARISON_OPERATOR: ${{ vars.OPTIONAL_ALARM2_COMPARISON_OPERATOR }}
        run: |
          PARAM_OVERRIDES=(
            "TriggerType=$TRIGGER_TYPE"
            "AlertTopicArn=/integrations/shared/AlertTopicArn"
            "Environment=$ENVIRONMENT"
          )

          [ -n "$SCHEDULE" ]              && PARAM_OVERRIDES+=("ScheduleExpression='$SCHEDULE'")
          [ -n "$ALERT_EMAIL_OVERRIDE" ]  && PARAM_OVERRIDES+=("AlertEmailOverride=$ALERT_EMAIL_OVERRIDE")
          [ -n "$SCHEDULE_EVAL_PERIODS" ] && PARAM_OVERRIDES+=("ScheduleEvaluationPeriods=$SCHEDULE_EVAL_PERIODS")
          [ -n "$SCHEDULE_ALARM_WINDOW" ] && PARAM_OVERRIDES+=("ScheduleAlarmWindow=$SCHEDULE_ALARM_WINDOW")
          [ -n "$LOG_LEVEL" ] && PARAM_OVERRIDES+=("LogLevel=$LOG_LEVEL")

          [ -n "$OPTIONAL_ALARM1_FILTER" ]              && PARAM_OVERRIDES+=("OptionalAlarm1FilterPattern='$OPTIONAL_ALARM1_FILTER'")
          [ -n "$OPTIONAL_ALARM1_WINDOW" ]              && PARAM_OVERRIDES+=("OptionalAlarm1Window=$OPTIONAL_ALARM1_WINDOW")
          [ -n "$OPTIONAL_ALARM1_STATISTIC" ]           && PARAM_OVERRIDES+=("OptionalAlarm1Statistic=$OPTIONAL_ALARM1_STATISTIC")
          [ -n "$OPTIONAL_ALARM1_THRESHOLD" ]           && PARAM_OVERRIDES+=("OptionalAlarm1Threshold=$OPTIONAL_ALARM1_THRESHOLD")
          [ -n "$OPTIONAL_ALARM1_COMPARISON_OPERATOR" ] && PARAM_OVERRIDES+=("OptionalAlarm1ComparisonOperator=$OPTIONAL_ALARM1_COMPARISON_OPERATOR")
          [ -n "$OPTIONAL_ALARM2_FILTER" ]              && PARAM_OVERRIDES+=("OptionalAlarm2FilterPattern='$OPTIONAL_ALARM2_FILTER'")
          [ -n "$OPTIONAL_ALARM2_WINDOW" ]              && PARAM_OVERRIDES+=("OptionalAlarm2Window=$OPTIONAL_ALARM2_WINDOW")
          [ -n "$OPTIONAL_ALARM2_STATISTIC" ]           && PARAM_OVERRIDES+=("OptionalAlarm2Statistic=$OPTIONAL_ALARM2_STATISTIC")
          [ -n "$OPTIONAL_ALARM2_THRESHOLD" ]           && PARAM_OVERRIDES+=("OptionalAlarm2Threshold=$OPTIONAL_ALARM2_THRESHOLD")
          [ -n "$OPTIONAL_ALARM2_COMPARISON_OPERATOR" ] && PARAM_OVERRIDES+=("OptionalAlarm2ComparisonOperator=$OPTIONAL_ALARM2_COMPARISON_OPERATOR")

          printf '%s\n' "${PARAM_OVERRIDES[@]}"

          sam deploy \
            --stack-name ${{ vars.STACK_NAME }} \
            --s3-bucket ${{ vars.S3_BUCKET }} \
            --region ${{ vars.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-resolve-s3 \
            --parameter-overrides "${PARAM_OVERRIDES[@]}"
