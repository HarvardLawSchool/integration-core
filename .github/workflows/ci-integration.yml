### Reusable CI Workflow
# Called by integration repos via:
#   uses: HarvardLawSchool/integration-core/.github/workflows/ci-integration.yml@main
#
# *** BREAKING CHANGE WARNING ***
# This workflow is referenced at @main by all integration repos.
# Any breaking change here (changed deno-version, removed or reordered steps)
# takes effect IMMEDIATELY across every integration on their next CI run.
#
# Before merging changes to this file:
#   1. Test against at least one integration repo manually
#   2. Announce changes to integration developers
#   3. Consider using a feature branch and updating integrations one at a time
#
# Non-breaking changes (new optional inputs with defaults, added steps) are safe.

name: CI Integration (Reusable)

on:
  workflow_call:

# if two CI's are running based on action (e.g., pull_request & push), second cancels first because we only need one
concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1" # update deliberately — check https://github.com/gitleaks/gitleaks/releases
    steps:
      - uses: actions/checkout@v5

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --verbose \
            --no-git \
            --redact

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: gitleaks # block all CI steps if secrets are found
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.7.x"

      - name: Audit # fail fast: reads lockfile, can catch problems before an install
        run: deno audit --socket --level=critical

      - name: Check config
        run: |
          deno eval --no-lock "
            const { parse } = await import('jsr:@std/jsonc@1');
            const file = await Deno.readTextFile('deno.json').catch(() => Deno.readTextFile('deno.jsonc'));
            const { fmt = {} } = parse(file);
            const overrides = Object.keys(fmt).filter(k => !['include', 'exclude'].includes(k));
            if (overrides.length > 0) { console.error('Forbidden fmt overrides:', overrides.join(', ')); Deno.exit(1); }
          "

      - name: Format
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type Check
        run: deno check

      - name: Test
        run: deno test --permit-no-files
