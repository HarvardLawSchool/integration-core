### Reusable CI Workflow
# Called by integration repos via:
#   uses: HarvardLawSchool/integration-core/.github/workflows/ci-integration.yml@main
#
# *** BREAKING CHANGE WARNING ***
# This workflow is referenced at @main by all integration repos.
# Any breaking change here (changed deno-version, removed or reordered steps)
# takes effect IMMEDIATELY across every integration on their next CI run.
#
# Before merging changes to this file:
#   1. Test against at least one integration repo manually
#   2. Announce changes to integration developers
#   3. Consider using a feature branch and updating integrations one at a time
#
# Non-breaking changes (new optional inputs with defaults, added steps) are safe.

name: CI Integration (Reusable)

on:
  workflow_call:

# if two CI's are running based on action (e.g., pull_request & push), second cancels first because we only need one
concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.7.x"

      - name: Audit # fail fast: reads lockfile, can catch problems before an install
        run: deno audit --socket --level=critical

      - name: Format
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type Check
        run: deno check

      - name: Test
        run: deno test --permit-no-files
