###
### Parent stack for all integrations
###
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "Integration Tooling base infrastructure. See app-template.yml for app-specific resources"

Parameters:
  Environment:
    Type: String
    Default: "dev"
    AllowedValues: [dev, qa, test, staging, prod]
    Description: "Environment name"

  TriggerType:
    Type: String
    # Deployment override using Github Actions TRIGGER_TYPE variable.
    # For sam local invoke this won't matter
    Default: "schedule"
    AllowedValues: [webhook, schedule, both]
    Description: "How to trigger the Lambda function"

  LogLevel:
    Type: String
    Default: "info"
    AllowedValues: [trace, debug, info, warn, error]
    Description: "Lambda LOG_LEVEL environment variable"

  ### DO NOT EDIT THIS TEMPLATE
  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 1
    MaxValue: 900
    Description: "Lambda timeout in seconds"

  ### DO NOT EDIT THIS TEMPLATE
  DurationAlarmThresholdMs:
    Type: Number
    Default: 240000
    Description: >
      Duration alarm threshold in milliseconds — set to ~80% of LambdaTimeout.
      Formula: LambdaTimeout × 800  (×1000ms and ×0.8 combined).
      Default: 300 × 800 = 240000.
      Whenever LambdaTimeout is changed, update this to match: LambdaTimeout × 800.

  ScheduleEnabled:
    Type: String
    Default: "ENABLED"
    AllowedValues: [ENABLED, DISABLED]
    Description: "Schedule state (only used if TriggerType includes 'schedule')"

  ScheduleExpression:
    Type: String
    Default: "cron(0 0 * * ? *)" # midnight daily EST
    Description: >
      EventBridge schedule expression for the Lambda trigger.
      Examples:
        rate(1 hour)
        cron(0 8-20 * * ? *)   — hourly 08:00–20:00
        cron(15 1/6 * * ? *)   — every 6 hrs starting 01:15

  ScheduleTimezone:
    Type: String
    Default: "America/New_York"
    Description: >
      IANA timezone for ScheduleExpression.
      EventBridge Scheduler handles DST automatically.
      Examples: America/New_York, America/Chicago, UTC

  ScheduleEvaluationPeriods:
    Type: Number
    Default: 1
    Description: >
      Number of consecutive ScheduleAlarmPeriod windows that must all show
      no trigger before the alarm fires. Raise this to tolerate occasional
      missed runs before alerting.
      Examples: 1 (alert on first miss), 4 (tolerate 3 misses before alerting).

  ScheduleAlarmWindow:
    Type: String
    Default: "Daily"
    AllowedValues: [Hourly, HalfDaily, Daily, Disabled]
    Description: >
      Evaluation window for the missed-schedule alarm.
        Hourly    — 3600 s  (use with hourly schedule expressions)
        HalfDaily — 43200 s (use with 12-hour schedule expressions)
        Daily     — 86400 s (use with daily schedule expressions)
        Disabled  — no missed-schedule alarm is created

  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/integrations/shared/AlertTopicArn"
    Description: >
      Resolved from SSM at deploy time using the shared org alert topic.
      Override only needed for manual console deploys pointing at a different path.

  AlertEmailOverride:
    Type: String
    Default: ""
    Description: >
      When set, creates a local SNS topic and routes ALL alerts here
      instead of the shared AlertTopicArn. Use during development.

Mappings:
  AlarmWindowToSeconds:
    Hourly: { Seconds: 3600 }
    HalfDaily: { Seconds: 43200 }
    Daily: { Seconds: 86400 }

  EnvToRetention:
    dev:
      Days: 7
    qa:
      Days: 30
    test:
      Days: 30
    staging:
      Days: 30
    prod:
      Days: 365

Conditions:
  CreateSchedule: !Or
    - !Equals [!Ref TriggerType, "schedule"]
    - !Equals [!Ref TriggerType, "both"]

  # Avoids a permanently-firing alarm when schedule is intentionally disabled
  MonitorSchedule: !And
    - Condition: CreateSchedule
    - !Equals [!Ref ScheduleEnabled, "ENABLED"]
    - !Not [!Equals [!Ref ScheduleAlarmWindow, "Disabled"]]

  UseLocalAlertTopic: !Not [!Equals [!Ref AlertEmailOverride, ""]]

Resources:
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ParametersAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/integrations/${AWS::StackName}*"
              # State: read+write, scoped to subtree using "STATE_" prefixes
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/integrations/${AWS::StackName}/STATE_*"

  Lambda:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures: [x86_64]
      Timeout: !Ref LambdaTimeout
      MemorySize: 512
      Role: !GetAtt ExecutionRole.Arn
      Environment:
        Variables:
          PARAMS_NAME: !Sub "/integrations/${AWS::StackName}"
          ENVIRONMENT: !Ref Environment
          SERVICE_NAME: !Ref AWS::StackName
          TRIGGER_TYPE: !Ref TriggerType
          LOG_LEVEL: !Ref LogLevel
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .

  LocalAlertTopic:
    Type: AWS::SNS::Topic
    Condition: UseLocalAlertTopic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alerts"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmailOverride

  SchedulerRole:
    Type: AWS::IAM::Role
    Condition: CreateSchedule
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt Lambda.Arn

  ScheduleRule:
    Type: AWS::Scheduler::Schedule
    Condition: CreateSchedule
    Properties:
      Description: !Sub "Scheduled trigger for ${AWS::StackName}"
      ScheduleExpression: !Ref ScheduleExpression
      ScheduleExpressionTimezone: !Ref ScheduleTimezone
      State: !Ref ScheduleEnabled
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt Lambda.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: !Sub |
          {
            "source": "eventbridge.schedule",
            "service": "${AWS::StackName}"
          }

  # Explicit log group ensures MetricFilter deploys successfully on first deploy
  # (Lambda only auto-creates it on first invocation)
  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain # Don't destroy logs on stack delete
    UpdateReplacePolicy: Retain # Don't destroy logs on stack delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Lambda}"
      RetentionInDays: !FindInMap [EnvToRetention, !Ref Environment, Days]

  RuntimeErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LogGroup
      FilterPattern: '?"Task timed out" ?"Runtime exited with error" ?"Process exited before completing" ?"signal: killed"'
      MetricTransformations:
        - MetricNamespace: !Sub "Integrations/${AWS::StackName}"
          MetricName: RuntimeErrorCount
          MetricValue: "1"
          DefaultValue: 0

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "ERROR logs detected in ${AWS::StackName}"
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Threshold: 1
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [UseLocalAlertTopic, !Ref LocalAlertTopic, !Ref AlertTopicArn]
      Metrics:
        - Id: appErrors
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: !Sub "Integrations/${AWS::StackName}"
              MetricName: AppErrorCount
            Period: 3600
            Stat: Sum
        - Id: runtimeErrors
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: !Sub "Integrations/${AWS::StackName}"
              MetricName: RuntimeErrorCount
            Period: 3600
            Stat: Sum
        - Id: totalErrors
          ReturnData: true
          Expression: appErrors + runtimeErrors

  # Uses built-in Lambda metrics — no log group or filter needed
  ThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Lambda throttling detected in ${AWS::StackName}"
      MetricName: Throttles
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref Lambda
      Statistic: Sum
      Period: 3600 # 1 hour window
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [UseLocalAlertTopic, !Ref LocalAlertTopic, !Ref AlertTopicArn]
      # Notify on recovery
      OKActions:
        - !If [UseLocalAlertTopic, !Ref LocalAlertTopic, !Ref AlertTopicArn]

  DurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Threshold: !Ref DurationAlarmThresholdMs
      AlarmDescription: !Sub "Lambda duration exceeds ~80% of timeout (${DurationAlarmThresholdMs}ms) in ${AWS::StackName}"
      MetricName: Duration
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref Lambda
      Statistic: Maximum
      Period: 3600 # 1 hour window
      EvaluationPeriods: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !If [UseLocalAlertTopic, !Ref LocalAlertTopic, !Ref AlertTopicArn]

  ScheduleMissedAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: MonitorSchedule
    Properties:
      AlarmDescription: !Sub "Scheduled rule did not fire in ${AWS::StackName}"
      # AWS/Scheduler InvocationAttemptCount is used rather than AWS/Lambda Invocations because:
      # - It is schedule-specific and won't be masked by webhook invocations
      #   when TriggerType is "both"
      # - It signals at the Scheduler level, upstream of Lambda execution
      # Complements ErrorAlarm: that catches Lambda ran but failed;
      # this catches Lambda never ran at all
      MetricName: InvocationAttemptCount
      Namespace: AWS/Scheduler
      Dimensions:
        - Name: ScheduleName
          Value: !Ref ScheduleRule
      Statistic: Sum
      Period: !FindInMap [
        AlarmWindowToSeconds,
        !Ref ScheduleAlarmWindow,
        Seconds,
      ]
      EvaluationPeriods: !Ref ScheduleEvaluationPeriods
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      # TreatMissingData: breaching is what makes this work —
      # Scheduler only emits InvocationAttemptCount when the schedule actually fires,
      # so an empty period means no trigger occurred
      TreatMissingData: breaching
      AlarmActions:
        - !If [UseLocalAlertTopic, !Ref LocalAlertTopic, !Ref AlertTopicArn]
      # DO NOT ADD OKActions — this is intentional, not an omission.
      # TreatMissingData: breaching causes this alarm to cycle ALARM→OK on
      # every successful run, generating nightly noise for normal operation.
      # Recovery from a genuine miss should be confirmed manually in CloudWatch
      # while triaging the original ALARM notification.

  ### App-specific resources (merged at deploy time)
  # EffectiveAlertTopicArn resolves the conditional here so app-template.yml
  # receives a plain string and doesn't need to re-declare the condition
  AppStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./app-template.yml
      Parameters:
        StackName: !Ref AWS::StackName
        Environment: !Ref Environment
        LogGroupName: !Ref LogGroup
        EffectiveAlertTopicArn: !If [
          UseLocalAlertTopic,
          !Ref LocalAlertTopic,
          !Ref AlertTopicArn,
        ]
        ExecutionRoleName: !Ref ExecutionRole
        ExecutionRoleArn: !GetAtt ExecutionRole.Arn
        LambdaArn: !GetAtt Lambda.Arn
        LambdaName: !Ref Lambda
        TriggerType: !Ref TriggerType

Outputs:
  StackName:
    Value: !Ref AWS::StackName

  FunctionName:
    Value: !Ref Lambda

  FunctionArn:
    Value: !GetAtt Lambda.Arn

  RoleName:
    Value: !Ref ExecutionRole
    Description: "IAM Role Name"

  ParametersPath:
    Value: !Sub "/integrations/${AWS::StackName}"

  ScheduleRuleName:
    Condition: CreateSchedule
    Value: !Ref ScheduleRule

  ScheduleMissedAlarmName:
    Condition: MonitorSchedule
    Description: CloudWatch alarm for missed schedule detection
    Value: !Ref ScheduleMissedAlarm

  EffectiveAlertTopicArn:
    Value: !If [UseLocalAlertTopic, !Ref LocalAlertTopic, !Ref AlertTopicArn]
    Description: "SNS topic receiving alerts, local if AlertEmailOverride is set otherwise shared org topic"

  AlertEmailOverrideAddress:
    Condition: UseLocalAlertTopic
    Description: Overrides org-shared AlertTopicArn notifications recipient
    Value: !Ref AlertEmailOverride

  ErrorAlarmName:
    Value: !Ref ErrorAlarm
    Description: "CloudWatch alarm name — fires when ERROR logs or Lambda runtime errors are detected"

  ErrorAlarmArn:
    Value: !GetAtt ErrorAlarm.Arn
    Description: "CloudWatch alarm ARN"
